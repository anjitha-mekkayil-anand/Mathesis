<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Mathesis logo — readiness steps rising from an open book -->
  <rect width="512" height="512" rx="96" fill="#0d1b2a"/>

  <!-- open book -->
  <path d="M256 416 C210 392 140 388 84 404 V296 C140 280 210 284 256 308 Z"
        fill="#13293d" stroke="#7fd8d8" stroke-width="14" stroke-linejoin="round"/>
  <path d="M256 416 C302 392 372 388 428 404 V296 C372 280 302 284 256 308 Z"
        fill="#13293d" stroke="#7fd8d8" stroke-width="14" stroke-linejoin="round"/>
  <line x1="256" y1="308" x2="256" y2="416" stroke="#7fd8d8" stroke-width="10"/>

  <!-- ascending readiness steps rising off the page -->
  <polyline points="140,332 196,332 196,272 252,272 252,212 308,212 308,152 364,152"
            fill="none" stroke="#f4a259" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- the summit: readiness reached -->
  <circle cx="392" cy="124" r="22" fill="#0d1b2a" stroke="#f4a259" stroke-width="12"/>
  <circle cx="392" cy="124" r="7" fill="#f4a259"/>
</svg>
