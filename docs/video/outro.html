<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  body { width: 1280px; height: 720px; background: #0d1b2a; overflow: hidden;
         display: flex; flex-direction: column; align-items: center; justify-content: center; }
  img { width: 1150px; border-radius: 10px; }
  #caption { position: fixed; left: 0; right: 0; bottom: 0; height: 64px;
             background: rgba(13,27,42,.95); border-top: 1px solid #2e4a66;
             display: flex; align-items: center; justify-content: center; gap: 26px;
             font-family: 'Segoe UI', sans-serif; }
  #caption .url { color: #f4a259; font-size: 21px; font-weight: 600; }
  #caption .line { color: #7fd8d8; font-size: 21px; font-style: italic; }
</style>
</head>
<body>
  <img src="../logo/mathesis-architecture.png" alt=""/>
  <div id="caption">
    <span class="url">github.com/anjitha-mekkayil-anand/Mathesis</span>
    <span class="line">— agents reason; people decide.</span>
  </div>
</body>
</html>
